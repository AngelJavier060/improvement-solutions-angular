version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-db_improvement_solutions}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - improvement_network
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-db_improvement_solutions}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-Javier}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-javierangelmsn@outlook.es}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      - postgres
    networks:
      - improvement_network
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:

networks:
  improvement_network:
    driver: bridge
