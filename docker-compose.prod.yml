services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: improvement-backend
    restart: unless-stopped
    user: "0:0"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SERVER_PORT: ${SERVER_PORT:-8081}
    ports:
      - "${BACKEND_PORT:-8082}:8081"
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/api/auth/emergency-reset"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: improvement-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-8001}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - proxy-network

volumes:
  backend-uploads:
  backend-logs:

networks:
  proxy-network:
    external: true
