server {
    listen 80;
    server_name localhost improvement-solution.com www.improvement-solution.com;

    # Aumentar límite de carga para archivos (20 MB)
    client_max_body_size 20m;

    # Cabeceras de seguridad (sin HSTS en HTTP)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Desactivar redirect absoluto para que Nginx preserve host:port del cliente
    absolute_redirect off;

    # Redirigir raíz exacta a /en-US/
    location = / {
        return 301 /en-US/;
    }

    # Servir la app Angular desde /en-US/
    location ^~ /en-US/ {
        try_files $uri $uri/ /en-US/index.html;
    }

    # Cualquier otra ruta no /api/ redirige a /en-US/
    location / {
        return 301 /en-US$request_uri;
    }

    # Proxy para el backend API
    location ^~ /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Archivos estáticos con cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache para index.html (evita referencias a chunks antiguos)
    location = /en-US/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires 0;
    }

    # Página de error personalizada
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
