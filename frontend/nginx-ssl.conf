server {
    listen 80;
    server_name improvement-solution.com www.improvement-solution.com;

    # Redirigir todo a HTTPS (producción)
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name localhost;

    # En local normalmente no hay TLS: servir por HTTP
    root /usr/share/nginx/html;
    index index.html index.htm;
    absolute_redirect off;

    # Aumentar límite de carga para archivos (20 MB)
    client_max_body_size 20m;

    # Cabeceras de seguridad (sin HSTS en HTTP)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    location = / { return 301 /en-US/; }
    location ^~ /en-US/ { try_files $uri $uri/ /en-US/index.html; }
    location / { return 301 /en-US$request_uri; }

    location ^~ /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /en-US/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires 0;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }

    access_log /var/log/nginx/improvement-solutions_access.log;
    error_log /var/log/nginx/improvement-solutions_error.log;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}

server {
    listen 443 ssl http2;
    server_name improvement-solution.com www.improvement-solution.com;

    ssl_certificate     /etc/letsencrypt/live/improvement-solution.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/improvement-solution.com/privkey.pem;

    # TLS hardening básico
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Aumentar límite de carga para archivos (20 MB)
    client_max_body_size 20m;

    # Cabeceras de seguridad (HSTS solo en HTTPS)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html index.htm;
    absolute_redirect off;

    location = / { return 301 /en-US/; }
    location ^~ /en-US/ { try_files $uri $uri/ /en-US/index.html; }
    location / { return 301 /en-US$request_uri; }

    location ^~ /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /en-US/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires 0;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }

    access_log /var/log/nginx/improvement-solutions_access.log;
    error_log /var/log/nginx/improvement-solutions_error.log;
}
