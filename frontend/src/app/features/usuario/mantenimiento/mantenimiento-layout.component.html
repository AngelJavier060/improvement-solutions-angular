<!-- Sidebar -->
<aside class="bg-light border-end" style="position: fixed; left: 0; top: 0; width: 250px; height: 100vh; z-index: 1000; overflow-y: auto;">
  <div class="p-4 border-bottom">
    <h5 class="fw-bold text-primary mb-0">Gestión de Flota</h5>
    <small class="text-muted">Sovereign Guardian</small>
  </div>
  
  <nav class="p-3">
    <a 
      *ngFor="let item of menuItems"
      [routerLink]="item.route ? ['/usuario', businessRuc, 'mantenimiento', item.route] : ['/usuario', businessRuc, 'mantenimiento']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="item.route === '' ? { exact: true } : { exact: false }"
      class="nav-link d-flex align-items-center gap-2 py-2 px-3 rounded mb-1">
      <i [class]="'fas fa-' + item.icon"></i>
      {{ item.label }}
    </a>
  </nav>
</aside>

<!-- Top Navbar -->
<header class="bg-white border-bottom sticky-top" style="margin-left: 250px; z-index: 999;">
  <div class="d-flex justify-content-between align-items-center px-4 py-3">
    <div class="d-flex align-items-center gap-3">
      <h6 class="fw-bold text-primary mb-0">Guardian de Flota</h6>
      <span class="text-muted">|</span>
      <span class="text-muted">Orientoil</span>
    </div>
    
    <div class="d-flex align-items-center gap-3" *ngIf="currentUser">
      <div class="d-flex align-items-center gap-2">
        <div class="text-end">
          <div class="small fw-bold">{{ currentUser.name || currentUser.username }}</div>
          <div class="text-muted" style="font-size: 0.7rem;">{{ currentUser.email }}</div>
        </div>
        <div class="dropdown">
          <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="fas fa-user-circle"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <button class="dropdown-item" (click)="logout()">
                <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Main Content -->
<main style="margin-left: 250px;">
  <router-outlet></router-outlet>
</main>
