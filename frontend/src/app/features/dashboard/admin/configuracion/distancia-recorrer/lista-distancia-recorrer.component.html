<app-catalogo-viaje-lista-shell
  [sections]="sections"
  [items]="items"
  [metodologias]="metodologias"
  [loading]="loading"
  [error]="error"
  pageIcon="fas fa-route"
  pageTitle="Distancias a Recorrer"
  pageSubtitle="Listado agrupado por metodología. Columnas y riesgo según lo definido en aceptación de riesgo (GTC-45, IPER u otros)."
  nameColumnLabel="Distancia a Recorrer"
  newButtonLabel="Nueva Distancia"
  emptyIcon="fas fa-route"
  emptyTitle="Sin distancias configuradas"
  emptyText="Agregue rangos y asocie una metodología; los parámetros saldrán del editor de aceptación de riesgo."
  emptyButtonLabel="Agregar primera distancia"
  globalTotalLabel="Total de rangos"
  (back)="goBack()"
  (nuevo)="goToNew()"
  (edit)="openEdit($event)"
  (delete)="confirmDelete($event)"
/>
