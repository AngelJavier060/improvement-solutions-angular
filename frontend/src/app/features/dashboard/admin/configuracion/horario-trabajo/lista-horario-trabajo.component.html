<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <button class="btn btn-outline-secondary btn-sm me-2" (click)="goBack()">
        <i class="fas fa-arrow-left me-1"></i>Volver
      </button>
      <h4 class="d-inline-block mb-0 fw-bold">Horarios de Trabajo</h4>
    </div>
    <button class="btn btn-primary" (click)="goToNew()">
      <i class="fas fa-plus me-1"></i>Nuevo Horario
    </button>
  </div>

  <div *ngIf="successMessage" class="alert alert-success alert-dismissible">
    <i class="fas fa-check-circle me-2"></i>{{ successMessage }}
  </div>
  <div *ngIf="error" class="alert alert-danger">
    <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2 text-muted">Cargando...</p>
  </div>

  <div *ngIf="!loading" class="card shadow-sm border-0">
    <div class="card-body p-0">
      <div *ngIf="horarios.length === 0" class="text-center py-5 text-muted">
        <i class="fas fa-clock fa-3x mb-3 opacity-25"></i>
        <p>No hay horarios de trabajo registrados.</p>
      </div>
      <table *ngIf="horarios.length > 0" class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Estado</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let h of horarios; let i = index">
            <td>{{ i + 1 }}</td>
            <td class="fw-semibold">{{ h.name }}</td>
            <td class="text-muted">{{ h.description || '—' }}</td>
            <td>
              <span class="badge" [class.bg-success]="h.active !== false" [class.bg-secondary]="h.active === false">
                {{ h.active !== false ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary me-1" (click)="goToEdit(h.id!)">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" (click)="delete(h.id!)">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
