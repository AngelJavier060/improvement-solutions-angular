<app-catalogo-viaje-lista-shell
  [sections]="sections"
  [items]="items"
  [metodologias]="metodologias"
  [loading]="loading"
  [error]="error"
  pageIcon="fas fa-clock"
  pageTitle="Horarios de circulación"
  pageSubtitle="Catálogo agrupado por metodología (GTC-45, IPER u otros), alineado con aceptación de riesgo."
  nameColumnLabel="Horario de circulación"
  newButtonLabel="Nuevo horario"
  emptyIcon="fas fa-clock"
  emptyTitle="Sin horarios de circulación"
  emptyText="Agregue horarios y asocie metodología; los niveles se definen en aceptación de riesgo."
  emptyButtonLabel="Agregar primer horario"
  globalTotalLabel="Total de registros"
  (back)="goBack()"
  (nuevo)="goToNew()"
  (edit)="openEdit($event)"
  (delete)="confirmDelete($event)"
/>
