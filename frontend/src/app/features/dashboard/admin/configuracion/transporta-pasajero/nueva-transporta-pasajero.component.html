<div class="config-form-container">
  <div class="config-form-header">
    <button class="btn-back" (click)="goBack()">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h2>Nueva Transporta Pasajeros</h2>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="config-form">
    <div class="form-group">
      <label for="name">Nombre *</label>
      <input id="name" type="text" formControlName="name" class="form-control"
             [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched">
      <span class="invalid-feedback" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        El nombre es requerido
      </span>
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea id="description" formControlName="description" class="form-control" rows="3"></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="goBack()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
        <span *ngIf="loading">Guardando...</span>
        <span *ngIf="!loading">Guardar</span>
      </button>
    </div>
  </form>
</div>
