<div class="container py-3">
  <h3 class="mb-3">Categorías de Inventario</h3>

  <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>
  <div *ngIf="ok" class="alert alert-success py-2">{{ ok }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="row g-2 mb-3">
    <div class="col-12 col-md-4">
      <label class="form-label">Nombre</label>
      <input class="form-control" formControlName="name" placeholder="Ej. EPP" />
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Descripción</label>
      <input class="form-control" formControlName="description" placeholder="Descripción (opcional)" />
    </div>
    <div class="col-12 col-md-2 d-flex align-items-end gap-2">
      <button class="btn btn-primary w-100" [disabled]="loading || form.invalid">
        {{ editingId === null ? 'Agregar' : 'Guardar' }}
      </button>
      <button type="button" class="btn btn-secondary" *ngIf="editingId !== null" (click)="cancelEdit()">Cancelar</button>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table table-sm align-middle">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th style="width: 160px;">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of list">
          <td class="fw-semibold">{{ c.name }}</td>
          <td>{{ c.description || '-' }}</td>
          <td>
            <button type="button" class="btn btn-sm btn-outline-primary me-2" (click)="startEdit(c)">Editar</button>
            <button type="button" class="btn btn-sm btn-outline-danger" (click)="remove(c.id)">Eliminar</button>
          </td>
        </tr>
        <tr *ngIf="!list || list.length === 0">
          <td colspan="3" class="text-center text-muted py-3">Sin categorías aún</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
