org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Windows: proyecto en D: y Pub cache en C: rompe la compilación incremental de Kotlin en plugins (p. ej. pdfx).
# "different roots" / Could not close incremental caches — desactivar incremental evita el fallo.
kotlin.incremental=false
